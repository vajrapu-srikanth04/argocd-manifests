name: "Toggle HPA / KEDA Scaling"
run-name: "${{ github.event_name == 'schedule' && '⏰ Scheduled' || '👤 Manual' }} - ${{ inputs.mode == 'night' && '🌙 NIGHT 12:00 AM IST (18:30 UTC) - KEDA ON / HPA OFF' || '🌅 MORNING 6:00 AM IST (00:30 UTC) - HPA ON / KEDA OFF' }} by @${{ github.actor }}"

on:
#   schedule:
#     - cron: "30 18 * * 0-5" # 18:30 UTC Sun-Fri = 12:00 AM IST Sun-Fri → 🌙 NIGHT
#     - cron : "30 0 * * 0-5"  # 00:30 UTC Mon-Fri = 06:00 AM IST Mon-Fri → 🌅 MORNING
 
  workflow_dispatch:
    inputs:
      mode:
        description: |
          Scaling mode:
            🌙 night   → 12:00 AM IST (18:30 UTC) - KEDA ON + HPA OFF (autoscaling.enabled=false)
            🌅 morning → 6:00 AM IST (00:30 UTC) - HPA ON + KEDA OFF (autoscaling.enabled=true)
        required: true
        type: choice
        options:
          - night
          - morning

# =====================================================================
# Job 1 - Resolve mode + read scaling-config.yaml → build JSON arrays
# =====================================================================
jobs:
  resolve-config:
    name: "Resolve mode and build service list"
    runs-on: ubuntu-latest
    outputs:
      mode:            ${{ steps.resolve.outputs.mode }}
      argocd_services: ${{ steps.resolve.outputs.argocd_services }}
      keda_files:      ${{ steps.resolve.outputs.keda_files }}

    steps:
      - name: "Checkout (to read scaling-config.yaml)"
        uses: actions/checkout@v5
      
      - name: install yq v4
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version                      # confirm v4.x.x

      - name: Resolve mode and parse config
        id: resolve
        run: |
          # -- Resolve mode -------------------------------------
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            HHMM=$(date -u +%H%M)
            echo "▶ Current UTC time (HHMM): $HHMM"
            # if [[ "$HHMM" =~ 18[3-5][0-9]$ ]] ; then   # 18:30-18:59 UTC (NIGHT)
            if [ "$HHMM" -ge 1830 ] && [ "$HHMM" -le 1959 ]; then
              MODE="night"
            elif [[ "$HHMM" =~ ^00[3-5][0-9]$ ]]; then   # 00:30-00:59 UTC (MORNING)
              MODE="morning"
            else
              echo "⚠️ Unexcepted trigger time $HHMM - defaulting to morning "
              MODE="morning"
            fi
          fi
          echo "▶ Resolved mode: $MODE"
          echo "mode=$MODE" >> $GITHUB_OUTPUT

          CONFIG=".github/scaling-config.yaml"
          ARGOCD_REPO=$(yq e '.argocd_repo' "$CONFIG")
          echo "▶ ArgoCD Repo: $ARGOCD_REPO"
    
          # -- Parse argocd_services into JSON array -------------------------------------
          COUNT=$(yq e '.argocd_services | length' "$CONFIG")
          echo "▶ Total argocd_services: $COUNT"

          ARGOCD_JSON="["
          for i in $(seq 0 $((COUNT - 1))); do
            APP_FOLDER=$(yq e ".argocd_services[$i].app_folder" "$CONFIG")
            CHART_NAME=$(yq e ".argocd_services[$i].chart_name" "$CONFIG")
            ENV_FILE=$(yq e ".argocd_services[$i].env_file" "$CONFIG")

            echo "  [$i] $APP_FOLDER  / $CHART_NAME / $ENV_FILE"

            ENTRY="{\"name\":\"$CHART_NAME\",\"repo\":\"$ARGOCD_REPO\",\"application_folder_name\":\"$APP_FOLDER\",\"chart_name\":\"$CHART_NAME\",\"env_file_name\":\"$ENV_FILE\"}"

            if [ "$i" -eq 0 ]; then
              ARGOCD_JSON="$ARGOCD_JSON$ENTRY"
            else
              ARGOCD_JSON="$ARGOCD_JSON,$ENTRY"
            fi
          done
          ARGOCD_JSON="$ARGOCD_JSON]"

          echo "▶ argocd_services JSON:"
          echo "$ARGOCD_JSON" | jq '.'
          echo "argocd_services=$ARGOCD_JSON" >> "$GITHUB_OUTPUT"

          # -- Parse keda_files into JSON array -------------------------------------
          COUNT=$(yq e '.keda_files | length' "$CONFIG")
          echo "▶ Total keda_files: $COUNT"

          KEDA_JSON="["
          for i in $(seq 0 $((COUNT - 1))); do
            KEDA_REPO=$(yq e ".keda_files[$i].repo" "$CONFIG")
            KEDA_FILE=$(yq e ".keda_files[$i].path" "$CONFIG")

            echo "  [$i] $KEDA_REPO / $KEDA_FILE"

            ENTRY="{\"repo\":\"$KEDA_REPO\",\"path\":\"$KEDA_FILE\"}"

            if [ "$i" -eq 0 ]; then
              KEDA_JSON="$KEDA_JSON$ENTRY"
            else
              KEDA_JSON="$KEDA_JSON,$ENTRY"
            fi
          done
          KEDA_JSON="$KEDA_JSON]"
          
          echo "▶ keda_files JSON:"
          echo "$KEDA_JSON" | jq '.'
          echo "keda_files=$KEDA_JSON" >> "$GITHUB_OUTPUT"

# ====================================================================
# Job 2 - Call reusable workflow to toggle KEDA / HPA based on mode
# ====================================================================
  toggle-scaling:
    name: "Toggle Scaling ${{ needs.resolve-config.outputs.mode == 'night' && '🌙 NIGHT - KEDA ON / HPA OFF' || '🌅 MORNING - HPA ON / KEDA OFF' }}"
    needs: resolve-config
    uses: vajrapu-srikanth04/shared-workflows/.github/workflows/keda-enable-or-disable.yaml@main
    with:
      mode:            ${{ needs.resolve-config.outputs.mode }}
      argocd_services: ${{ needs.resolve-config.outputs.argocd_services }}
      keda_files:      ${{ needs.resolve-config.outputs.keda_files }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
